<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者設定 | P-CUBE（字幕）</title>
<link rel="stylesheet" href="../css/common.css">
<style>
.staff-row { display:flex; flex-wrap:wrap; gap:6px; padding:10px 0; border-bottom:1px solid var(--border); }
.staff-row:last-child { border-bottom:none; }
.staff-name-input { flex:1; min-height:36px; padding:6px 10px; border:1.5px solid var(--border-md); border-radius:var(--radius); font-size:14px; font-family:var(--font); }
.staff-toggle { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-sub); white-space:nowrap; }
.staff-del-btn { min-height:36px; min-width:36px; padding:6px 10px; border-radius:var(--radius); border:1.5px solid rgba(226,75,74,0.3); background:var(--red-50); color:var(--red-600); font-size:13px; cursor:pointer; }
.confirm-entry { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
.confirm-entry select { flex:1; height:36px; font-size:13px; padding:4px 8px; border:1.5px solid var(--border-md); border-radius:var(--radius); }
.confirm-add-btn { height:36px; padding:0 10px; border-radius:var(--radius); border:1.5px solid var(--green-400); background:var(--green-50); color:var(--green-600); font-size:13px; cursor:pointer; }
.confirm-del-btn { height:36px; padding:0 10px; border-radius:var(--radius); border:1.5px solid var(--border-md); background:var(--gray-100); color:var(--red-400); font-size:13px; cursor:pointer; }
.auto-btn { width:100%; min-height:44px; border-radius:var(--radius-pill); border:1.5px solid var(--amber-400); background:var(--amber-50); color:var(--amber-600); font-size:14px; font-weight:600; cursor:pointer; margin-bottom:8px; }
.decide-btn { width:100%; min-height:44px; border-radius:var(--radius-pill); border:none; background:var(--green-400); color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; }
.calendar-sheet-btn { width:100%; min-height:44px; border-radius:var(--radius-pill); border:1.5px solid #2196F3; background:#E3F2FD; color:#1565C0; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
.line-send-panel { background:var(--green-50); border:1px solid rgba(29,158,117,0.2); border-radius:var(--radius-lg); padding:14px; margin-top:16px; }

/* シフト入力・確定カレンダー共通 */
.shift-cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.shift-cal-title { font-size:15px; font-weight:700; }
.shift-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.shift-cal-dow { text-align:center; font-size:11px; font-weight:700; color:var(--text-hint); padding:4px 0; }
.shift-cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:var(--radius); font-size:13px; cursor:pointer; border:2px solid transparent; user-select:none; }
.shift-cal-day.empty,.shift-cal-day.no-shift { cursor:default; opacity:.25; border:none; background:none; }
.shift-cal-day.shift-date { background:var(--gray-50); border-color:var(--border); }
.shift-cal-day.has-staff { background:var(--green-50); border-color:var(--green-400); color:var(--green-600); font-weight:700; }
.shift-cal-day.has-req   { background:var(--amber-50); border-color:var(--amber-400); color:var(--amber-700); font-weight:700; }
.shift-cal-day.selected-date { background:var(--green-400); color:#fff !important; border-color:var(--green-600); font-weight:700; }
.shift-cal-day.conf-confirmed { background:var(--green-50); border-color:var(--green-400); color:var(--green-600); }
.shift-cal-day.conf-selected { background:var(--green-400); color:#fff !important; border-color:var(--green-600); }
.staff-cnt { font-size:9px; line-height:1.1; margin-top:2px; }
.conf-detail-box { background:var(--bg-sub); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px; margin-top:12px; }
.conf-detail-title { font-size:14px; font-weight:700; margin-bottom:10px; color:var(--green-600); }
.staff-confirmed-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:13px; }

/* シフト設定カレンダー */
.setting-cal-nav { display:flex; align-items:center; justify-content:space-between; margin:10px 0; }
.setting-cal-title { font-size:14px; font-weight:700; }
.setting-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:10px; }
.setting-cal-dow { text-align:center; font-size:10px; font-weight:700; color:var(--text-hint); padding:3px 0; }
.setting-cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:8px; font-size:12px; cursor:pointer; border:2px solid transparent; user-select:none; }
.setting-cal-day.empty { cursor:default; }
.setting-cal-day.shift-day { background:var(--green-50); border-color:var(--green-400); color:var(--green-600); font-weight:700; }
.setting-cal-day.extra-day { background:var(--green-400); color:#fff; font-weight:700; }
.setting-cal-day.excluded-day { background:var(--gray-100); color:var(--text-hint); text-decoration:line-through; border-color:var(--gray-400); }
.setting-cal-day.past { opacity:.4; cursor:default; }
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="header-logo">⚙</div>
    <div class="header-text">
      <div class="header-title">管理者設定</div>
      <div class="header-sub">P-CUBE（字幕）</div>
    </div>
    <a class="header-back" href="../">🏠 ホーム</a>
  </header>

  <!-- パスワード画面 -->
  <div id="pw-screen" class="content">
    <div class="card" style="margin-top:32px;">
      <div class="card-title" style="text-align:center;margin-bottom:16px;">🔒 管理者ログイン</div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input type="password" id="pw-input" class="form-control" placeholder="パスワードを入力">
      </div>
      <div id="pw-error" class="error-msg">パスワードが違います</div>
      <button class="btn btn-primary" id="pw-btn" onclick="checkPassword()">ログイン</button>
    </div>
  </div>

  <!-- 設定画面 -->
  <div id="admin-screen" class="hidden">
    <nav class="tab-bar">
      <button class="tab-item active" onclick="switchTab('settings',this)">基本設定</button>
      <button class="tab-item" onclick="switchTab('shift-mgmt',this)">シフト管理</button>
      <button class="tab-item" onclick="switchTab('staff',this)">スタッフ管理</button>
      <button class="tab-item" onclick="switchTab('templates',this)">定型文</button>
    </nav>

    <div class="content">

      <!-- ===== 基本設定 ===== -->
      <div id="tab-settings" class="tab-panel active">
        <div id="settings-error"   class="error-msg"></div>
        <div id="settings-success" class="success-msg"></div>

        <div class="section-title">通知設定</div>
        <div class="form-group">
          <label class="form-label">管理者メールアドレス</label>
          <input type="email" id="admin_email" class="form-control" placeholder="admin@gmail.com">
        </div>
        <div class="form-group">
          <label class="form-label">CCメールアドレス（1行1アドレス）</label>
          <textarea id="cc_emails" class="form-control" rows="3" placeholder="cc1@example.com&#10;cc2@example.com"></textarea>
        </div>

        <hr class="divider mt-16">
        <div class="section-title">起床確認メール（別送り先）</div>
        <p class="text-sm text-hint" style="margin-bottom:12px;">空欄の場合は上記「管理者メール・CC」が使用されます</p>
        <div class="form-group">
          <label class="form-label">起床確認メール宛先</label>
          <input type="email" id="wakeup_admin_email" class="form-control" placeholder="空欄＝通知設定と同じ">
        </div>
        <div class="form-group">
          <label class="form-label">起床確認メールCC（1行1アドレス）</label>
          <textarea id="wakeup_cc_emails" class="form-control" rows="2" placeholder="空欄＝通知設定と同じ"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">起床確認リマインダーの時刻</label>
          <input type="time" id="wakeup_reminder_time" class="form-control" oninput="document.getElementById('wakeup_reminder_time_jp').textContent=fmtTimeJP(this.value)">
          <span id="wakeup_reminder_time_jp" class="text-sm text-hint" style="display:block;margin-top:4px;"></span>
        </div>
        <div class="form-group">
          <label class="form-label">起床確認の期限</label>
          <input type="time" id="wakeup_deadline" class="form-control" oninput="document.getElementById('wakeup_deadline_jp').textContent=fmtTimeJP(this.value)">
          <span id="wakeup_deadline_jp" class="text-sm text-hint" style="display:block;margin-top:4px;"></span>
        </div>

        <hr class="divider mt-16">
        <div class="section-title">LINE設定</div>
        <div class="form-group">
          <label class="form-label">Channel Access Token</label>
          <input type="text" id="line_channel_token" class="form-control" placeholder="LINE Channel Access Token">
        </div>
        <hr class="divider mt-16">
        <div class="section-title">パスワード変更</div>
        <div class="form-group">
          <label class="form-label">新しいパスワード</label>
          <input type="password" id="new_password" class="form-control" placeholder="新しいパスワード">
        </div>
        <div class="form-group">
          <label class="form-label">確認用パスワード</label>
          <input type="password" id="confirm_password" class="form-control" placeholder="もう一度入力">
        </div>
        <button class="btn btn-primary" id="save-settings-btn" onclick="saveSettings()">設定を保存</button>
      </div>

      <!-- ===== シフト管理 ===== -->
      <div id="tab-shift-mgmt" class="tab-panel">
        <nav class="sub-tab-bar">
          <button class="sub-tab-item active" onclick="switchSubTab('shift-input',this)">シフト入力</button>
          <button class="sub-tab-item" onclick="switchSubTab('shift-confirmed',this)">シフト確定</button>
          <button class="sub-tab-item" onclick="switchSubTab('shift-settings',this)">シフト設定</button>
        </nav>

        <!-- シフト入力 -->
        <div id="subtab-shift-input" class="sub-tab-panel active">
          <div class="shift-cal-nav">
            <button class="cal-nav-btn" onclick="changeInputCalMonth(-1)">‹</button>
            <span class="shift-cal-title" id="input-cal-title"></span>
            <button class="cal-nav-btn" onclick="changeInputCalMonth(1)">›</button>
          </div>
          <div class="card" style="padding:10px;">
            <div class="shift-cal-grid" id="input-cal-grid"></div>
          </div>
          <div id="input-detail" class="conf-detail-box hidden">
            <div class="conf-detail-title" id="input-detail-title"></div>
            <div id="input-entries-wrap"></div>
          </div>
          <div id="conf-error"   class="error-msg" style="margin-top:8px;"></div>
          <div id="conf-success" class="success-msg"></div>
          <div id="all-ng-warn" class="hidden" style="background:var(--amber-50);border:1px solid var(--amber-400);border-radius:var(--radius);padding:10px 12px;font-size:13px;color:var(--amber-600);margin-top:12px;"></div>
          <button class="auto-btn" style="margin-top:8px;" onclick="autoGenerate()">🤖 仮作成（希望を元に自動生成）</button>
          <button class="calendar-sheet-btn" id="create-cal-btn" onclick="createCalendarSheet()">📋 シート作成（カレンダー作成）</button>
          <!-- 業務種別確認・編集リスト（仮作成後に表示） -->
          <div id="shift-type-list" class="hidden" style="margin-top:16px;">
            <div class="section-title" style="margin-bottom:8px;font-size:13px;">📋 業務種別の確認・変更</div>
            <div id="shift-type-list-body" style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;"></div>
          </div>
          <button class="decide-btn" id="save-confirm-btn" onclick="saveConfirmed()" style="margin-top:16px;">✅ 決定（シフト確定へ反映）</button>
        </div>

        <!-- シフト確定（管理者閲覧・LINE送信） -->
        <div id="subtab-shift-confirmed" class="sub-tab-panel">
          <div class="shift-cal-nav">
            <button class="cal-nav-btn" onclick="changeAdminConfCalMonth(-1)">‹</button>
            <span class="shift-cal-title" id="admin-conf-cal-title"></span>
            <button class="cal-nav-btn" onclick="changeAdminConfCalMonth(1)">›</button>
          </div>
          <div class="card" style="padding:10px;">
            <div class="shift-cal-grid" id="admin-conf-cal-grid"></div>
          </div>
          <div id="admin-conf-detail" class="conf-detail-box hidden">
            <div class="conf-detail-title" id="admin-conf-detail-title"></div>
            <div id="admin-conf-detail-staff"></div>
          </div>

          <div class="line-send-panel">
            <div class="card-title" style="color:var(--green-600);margin-bottom:10px;">📨 LINEグループへ通知</div>
            <button id="line-send-btn" class="btn btn-primary" style="background:var(--green-400);" onclick="sendLineShiftMessage()">今すぐ送信</button>
            <div id="line-send-result" class="success-msg mt-8"></div>
          </div>
        </div>

        <!-- シフト設定 -->
        <div id="subtab-shift-settings" class="sub-tab-panel">
          <div id="shift-settings-error"   class="error-msg"></div>
          <div id="shift-settings-success" class="success-msg"></div>

          <div class="form-group">
            <label class="form-label">提出期限（日付）</label>
            <input type="date" id="shift-deadline-date" class="form-control" oninput="document.getElementById('shift_deadline_jp').textContent=fmtDateJP(this.value)">
            <span id="shift_deadline_jp" class="text-sm text-hint" style="display:block;margin-top:4px;"></span>
          </div>

          <div class="form-group">
            <label class="form-label">シフト対象曜日</label>
            <div class="checkbox-group" id="admin-shift-days">
              <label class="checkbox-item"><input type="checkbox" value="1" onchange="renderSettingCal()"> <span>月</span></label>
              <label class="checkbox-item"><input type="checkbox" value="2" onchange="renderSettingCal()"> <span>火</span></label>
              <label class="checkbox-item"><input type="checkbox" value="3" onchange="renderSettingCal()"> <span>水</span></label>
              <label class="checkbox-item"><input type="checkbox" value="4" onchange="renderSettingCal()"> <span>木</span></label>
              <label class="checkbox-item"><input type="checkbox" value="5" onchange="renderSettingCal()"> <span>金</span></label>
              <label class="checkbox-item"><input type="checkbox" value="6" onchange="renderSettingCal()"> <span>土</span></label>
              <label class="checkbox-item"><input type="checkbox" value="0" onchange="renderSettingCal()"> <span>日</span></label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">個別日の追加・除外（カレンダーをタップ）</label>
            <p class="text-sm text-hint mb-8">🟢緑＝シフト対象 / 🔲グレー＝除外 / タップで切り替え</p>
            <div class="setting-cal-nav">
              <button class="cal-nav-btn" onclick="changeSettingCalMonth(-1)">‹</button>
              <span class="setting-cal-title" id="setting-cal-title"></span>
              <button class="cal-nav-btn" onclick="changeSettingCalMonth(1)">›</button>
            </div>
            <div class="setting-cal-grid" id="setting-cal-grid"></div>
            <div class="setting-cal-nav">
              <button class="cal-nav-btn" onclick="changeSettingCalMonth(-1)">‹</button>
              <span class="setting-cal-title" id="setting-cal-title2"></span>
              <button class="cal-nav-btn" onclick="changeSettingCalMonth(1)">›</button>
            </div>
            <div class="setting-cal-grid" id="setting-cal-grid2"></div>
          </div>

          <button class="btn btn-primary" onclick="saveShiftSettings()">設定を保存</button>
        </div>
      </div>

      <!-- ===== スタッフ管理 ===== -->
      <div id="tab-staff" class="tab-panel">
        <div id="staff-error"   class="error-msg"></div>
        <div id="staff-success" class="success-msg"></div>
        <div id="staff-list"></div>
        <hr class="divider mt-12">
        <div class="section-title">スタッフを追加</div>
        <div class="row mt-8">
          <input type="text"  id="new-staff-name"  class="form-control" placeholder="登録名（必須）" style="flex:1;">
          <input type="email" id="new-staff-email" class="form-control" placeholder="メール（任意）" style="flex:1;">
          <button id="add-staff-btn" class="btn btn-primary" style="width:auto;padding:0 16px;white-space:nowrap;" onclick="addStaff()">追加</button>
        </div>
      </div>

      <!-- ===== 定型文 ===== -->
      <div id="tab-templates" class="tab-panel">
        <div id="tmpl-error"   class="error-msg"></div>
        <div id="tmpl-success" class="success-msg"></div>
        <p class="text-sm text-hint mb-12">使用可能な変数：<code>{name}</code>（スタッフ名）、<code>{time}</code>（時刻）、<code>{date}</code>（日付）、<code>{deadline}</code>（期限）</p>

        <div class="form-group">
          <label class="form-label">🌅 起床確認リマインダー</label>
          <textarea id="template_wakeup" class="form-control" rows="4" placeholder="例：本日出勤の {name} さん、起床確認をお願いします。期限：{deadline}"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">🔔 起床未確認メール</label>
          <textarea id="template_wakeup_unconfirmed" class="form-control" rows="3" placeholder="例：{name}さんの起床確認ボタンが押されていません"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">🏢 出勤通知 件名</label>
          <textarea id="template_attendance_in" class="form-control" rows="2" placeholder="例：【出勤】{name}さんが出勤しました（{time}）"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">🏢 出勤通知 本文</label>
          <textarea id="template_attendance_in_body" class="form-control" rows="3" placeholder="空白の場合はデフォルト本文を使用"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">🏠 退勤通知 件名</label>
          <textarea id="template_attendance_out" class="form-control" rows="2" placeholder="例：【退勤】{name}さんが退勤しました（{time}）"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">🏠 退勤通知 本文</label>
          <textarea id="template_attendance_out_body" class="form-control" rows="3" placeholder="空白の場合はデフォルト本文を使用"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveTemplates()">定型文を保存</button>
      </div>

    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="../js/config.js"></script>
<script>
const DOW_LABELS = ['日','月','火','水','木','金','土'];
const today = new Date();
let staffData = [];
let allStaff  = [];
let confEntries = {};
let shiftDays = [1,2,4,5];
let extraDates = [];
let excludedDates = [];
let settingCalYear  = today.getFullYear();
let settingCalMonth = today.getMonth() + 1;

// シフト入力カレンダー用
let inputCalYear   = today.getFullYear();
let inputCalMonth  = today.getMonth() + 1;
let selectedInputDate = null;
let inputReqData   = {};

// シフト確定カレンダー用
let adminConfCalYear   = today.getFullYear();
let adminConfCalMonth  = today.getMonth() + 1;
let selectedAdminConfDate = null;
let adminConfData  = {};

// ---- 認証 ----
function checkPassword() {
  const pw  = document.getElementById('pw-input').value.trim();
  const btn = document.getElementById('pw-btn');
  if (!pw) return;
  btn.disabled = true; btn.textContent = '確認中…';
  const cbName = 'cb_pw_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    btn.disabled = false; btn.textContent = 'ログイン';
    if (res.success && res.data && res.data.ok) {
      sessionStorage.setItem('admin_ok','1');
      showAdminScreen();
    } else {
      document.getElementById('pw-error').classList.add('show');
    }
  };
  jsonp(GAS_URL.admin, { action:'checkPassword', password:pw }, cbName);
}
document.getElementById('pw-input').addEventListener('keydown', function(e){ if(e.key==='Enter') checkPassword(); });

function showAdminScreen() {
  document.getElementById('pw-screen').classList.add('hidden');
  document.getElementById('admin-screen').classList.remove('hidden');
  loadSettings();
  loadStaff();
  loadInputCalendar();
  callCleanupSettings();
}
function callCleanupSettings() {
  postNoCors(GAS_URL.shift, { action: 'cleanupSettings' }, function() {});
}
if (sessionStorage.getItem('admin_ok')) showAdminScreen();

// ---- タブ ----
function switchTab(name, btn) {
  document.querySelectorAll('#admin-screen .tab-panel').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('#admin-screen .tab-item').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='shift-mgmt') { loadInputCalendar(); loadAdminConfirmedCal(); }
  if (name==='staff') loadStaff();
  if (name==='templates') loadTemplates();
}

function switchSubTab(name, btn) {
  document.querySelectorAll('.sub-tab-panel').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.sub-tab-item').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('subtab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='shift-confirmed') loadAdminConfirmedCal();
  if (name==='shift-settings')  loadShiftSettings();
  if (name==='shift-input')     loadInputCalendar();
}

// ---- 基本設定 ----
function loadSettings() {
  const cbName = 'cb_settings_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    if (!res.success) return;
    const d = res.data;
    setVal('admin_email',         d.admin_email      || '');
    setVal('cc_emails',           (d.cc_emails||'').replace(/,/g,'\n'));
    setVal('wakeup_admin_email',  d.wakeup_admin_email || '');
    setVal('wakeup_cc_emails',    (d.wakeup_cc_emails||'').replace(/,/g,'\n'));
    setVal('wakeup_reminder_time', d.wakeup_reminder_time || '07:00');
    setVal('wakeup_deadline',      d.wakeup_deadline  || '08:00');
    setJPHint('wakeup_reminder_time_jp', fmtTimeJP(d.wakeup_reminder_time || '07:00'));
    setJPHint('wakeup_deadline_jp',      fmtTimeJP(d.wakeup_deadline      || '08:00'));
    setVal('line_channel_token',  d.line_channel_token || '');
    shiftDays    = (d.shift_days||'1,2,4,5').split(',').map(Number);
    extraDates   = (d.shift_extra_dates||'').split(',').filter(Boolean);
    excludedDates = (d.shift_excluded_dates||'').split(',').filter(Boolean);
  };
  jsonp(GAS_URL.admin, { action:'getSettings' }, cbName);
}
function setVal(id, val) { const el=document.getElementById(id); if(el) el.value=val; }
function setJPHint(id, text) { const el=document.getElementById(id); if(el) el.textContent=text; }

function saveSettings() {
  const newPw  = document.getElementById('new_password').value;
  const confPw = document.getElementById('confirm_password').value;
  const errEl  = document.getElementById('settings-error');
  const sucEl  = document.getElementById('settings-success');
  errEl.classList.remove('show'); sucEl.classList.remove('show');

// ---- シフト入力カレンダー ----
function changeInputCalMonth(delta) {
  inputCalMonth += delta;
  if (inputCalMonth > 12) { inputCalMonth=1; inputCalYear++; }
  if (inputCalMonth < 1)  { inputCalMonth=12; inputCalYear--; }
  selectedInputDate = null;
  document.getElementById('input-detail').classList.add('hidden');
  loadInputCalendar();
}

function loadInputCalendar() {
  document.getElementById('input-cal-title').textContent = inputCalYear+'年'+inputCalMonth+'月';
  const cbName = 'cb_conf_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    const existingConf = (res.success && res.data) ? res.data : {};
    loadInputRequests(existingConf);
  };
  jsonp(GAS_URL.shift, { action:'getConfirmedShift', year:inputCalYear, month:inputCalMonth }, cbName);
}

function loadInputRequests(existingConf) {
  const cbName = 'cb_cReq_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    inputReqData = (res.success && res.data) ? res.data : {};
    if (!allStaff.length) {
      const cb2 = 'cb_allst_'+Date.now();
      window[cb2] = function(r) {
        cleanup(cb2);
        allStaff = (r.success && r.data) ? r.data.map(function(s){return s.reg_name||s.line_name||'';}).filter(Boolean) : [];
        initConfEntries(existingConf);
        renderInputCalendar();
      };
      jsonp(GAS_URL.admin, { action:'getStaffList' }, cb2);
    } else {
      initConfEntries(existingConf);
      renderInputCalendar();
    }
  };
  jsonp(GAS_URL.shift, { action:'getShiftRequests', year:inputCalYear, month:inputCalMonth }, cbName);
}

function initConfEntries(existingConf) {
  confEntries = {};
  const daysInMonth = new Date(inputCalYear, inputCalMonth, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(inputCalYear, inputCalMonth-1, d);
    const isShift = shiftDays.indexOf(dt.getDay()) >= 0;
    const key = fmtDate(dt);
    const isExtra = extraDates.indexOf(key) >= 0;
    const isExcluded = excludedDates.indexOf(key) >= 0;
    if ((isShift || isExtra) && !isExcluded) {
      const existing = existingConf[key] || [];
      confEntries[key] = existing.length > 0
        ? existing.map(function(e){ return {name:e.name, type:e.type}; })
        : [];
    }
  }
}

function isShiftDate(dt) {
  const key = fmtDate(dt);
  const isExtra    = extraDates.indexOf(key) >= 0;
  const isExcluded = excludedDates.indexOf(key) >= 0;
  const isBase     = shiftDays.indexOf(dt.getDay()) >= 0;
  return (isBase || isExtra) && !isExcluded;
}

function renderInputCalendar() {
  const grid = document.getElementById('input-cal-grid');
  grid.innerHTML = '';
  DOW_LABELS.forEach(function(d) {
    const c = document.createElement('div'); c.className='shift-cal-dow'; c.textContent=d; grid.appendChild(c);
  });
  const firstDow = new Date(inputCalYear, inputCalMonth-1, 1).getDay();
  const days = new Date(inputCalYear, inputCalMonth, 0).getDate();
  for (let i=0; i<firstDow; i++) {
    const b=document.createElement('div'); b.className='shift-cal-day empty'; grid.appendChild(b);
  }
  for (let d=1; d<=days; d++) {
    const dt  = new Date(inputCalYear, inputCalMonth-1, d);
    const key = fmtDate(dt);
    const cell = document.createElement('div');
    if (!isShiftDate(dt)) {
      cell.className = 'shift-cal-day no-shift';
      cell.textContent = d;
    } else {
      const entries = confEntries[key] || [];
      const staffCount = entries.filter(function(e){ return e.name; }).length;
      const req = inputReqData[key];
      const reqCount = req ? ((req.ok||[]).length + (req.maybe||[]).length) : 0;
      if (key === selectedInputDate) {
        cell.className = 'shift-cal-day selected-date';
      } else if (staffCount > 0) {
        cell.className = 'shift-cal-day has-staff';
      } else if (reqCount > 0) {
        cell.className = 'shift-cal-day has-req';
      } else {
        cell.className = 'shift-cal-day shift-date';
      }
      const numEl = document.createElement('span');
      numEl.textContent = d;
      cell.appendChild(numEl);
      if (staffCount > 0) {
        const cnt = document.createElement('div');
        cnt.className = 'staff-cnt';
        cnt.textContent = staffCount+'名確';
        cell.appendChild(cnt);
      } else if (reqCount > 0) {
        const cnt = document.createElement('div');
        cnt.className = 'staff-cnt';
        cnt.textContent = reqCount+'名希';
        cell.appendChild(cnt);
      }
      cell.addEventListener('click', (function(k){ return function(){ showInputDetail(k); }; })(key));
    }
    grid.appendChild(cell);
  }
}

function showInputDetail(date) {
  selectedInputDate = date;
  renderInputCalendar();
  const parts = date.split('-');
  document.getElementById('input-detail-title').textContent = fmtDateJP(date)+' のシフト希望';
  if (!confEntries[date]) confEntries[date] = [];
  renderInputEntries(date);
  const det = document.getElementById('input-detail');
  det.classList.remove('hidden');
  det.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function renderInputEntries(date) {
  const wrap = document.getElementById('input-entries-wrap');
  wrap.innerHTML = '';
  const req = inputReqData[date] || { ok:[], maybe:[], ng:[] };
  const staff = allStaff.length ? allStaff : (req.ok||[]).concat(req.maybe||[]).concat(req.ng||[]);
  if (!staff.length) {
    const p = document.createElement('p');
    p.className = 'text-sm text-hint';
    p.style.padding = '4px 0';
    p.textContent = 'スタッフが登録されていません';
    wrap.appendChild(p);
    return;
  }
  staff.forEach(function(name) {
    var mark, label, color, bg;
    if ((req.ok||[]).indexOf(name) >= 0) {
      mark='○'; label='OK'; color='var(--green-600)'; bg='var(--green-50)';
    } else if ((req.maybe||[]).indexOf(name) >= 0) {
      mark='△'; label='応相談'; color='var(--amber-600)'; bg='var(--amber-50)';
    } else if ((req.ng||[]).indexOf(name) >= 0) {
      mark='✕'; label='休み'; color='var(--text-hint)'; bg='var(--gray-100)';
    } else {
      mark='－'; label='未回答'; color='var(--text-hint)'; bg='var(--gray-50)';
    }
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:5px 8px;margin-bottom:4px;border-radius:var(--radius);background:'+bg+';font-size:13px;';
    div.innerHTML =
      '<span style="font-weight:700;color:'+color+';min-width:18px;text-align:center;">'+mark+'</span>'+
      '<span style="font-weight:500;flex:1;">'+esc(name)+'</span>'+
      '<span style="font-size:11px;color:'+color+';font-weight:600;">'+label+'</span>';
    wrap.appendChild(div);
  });
}

function addInputEntry() {
  if (!selectedInputDate) return;
  if (!confEntries[selectedInputDate]) confEntries[selectedInputDate] = [];
  confEntries[selectedInputDate].push({name:'', type:'---'});
  renderInputEntries(selectedInputDate);
  renderInputCalendar();
}

function delInputEntry(date, i) {
  confEntries[date].splice(i, 1);
  renderInputEntries(date);
  renderInputCalendar();
}

// 仮作成：○のスタッフのみで作成。全員✕（ngのみ）の日だけ警告表示
function autoGenerate() {
  const cbName = 'cb_auto_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    const reqData = (res.success && res.data) ? res.data : {};
    inputReqData = reqData;
    const allNgDates = [];
    // initConfEntries が設定した業務日のみ対象（非業務日は含まない）
    Object.keys(confEntries).sort().forEach(function(date) {
      const d = reqData[date];
      const candidates = d ? (d.ok||[]) : [];
      // 各業務日は1行（名前1つ・業務1つ）。○の筆頭候補を初期値にセット
      if (candidates.length > 0) {
        confEntries[date] = [{ name: candidates[0], type: '業務A' }];
      } else {
        // 候補なし：空エントリ1件で仮作成
        confEntries[date] = [{ name:'', type:'---' }];
        // 本当に全員✕（ngに誰かいる）場合のみ警告
        if (d && (d.ng||[]).length > 0) {
          allNgDates.push(fmtDateJP(date));
        }
      }
    });
    // 全員✕の日を警告エリアに表示
    const warnEl = document.getElementById('all-ng-warn');
    if (allNgDates.length) {
      warnEl.innerHTML = '⚠️ 全員✕（担当なし）の日：<br><strong>'+allNgDates.join('、')+'</strong>';
      warnEl.classList.remove('hidden');
    } else {
      warnEl.classList.add('hidden');
    }
    renderInputCalendar();
    if (selectedInputDate) renderInputEntries(selectedInputDate);
    renderShiftTypeList();
    showToast('仮作成しました。業務種別を確認して「決定」を押してください');
  };
  jsonp(GAS_URL.shift, { action:'getShiftRequests', year:inputCalYear, month:inputCalMonth }, cbName);
}

// 業務種別確認・編集リストを描画（仮作成後に全日程分を一覧表示）
function renderShiftTypeList() {
  const wrap      = document.getElementById('shift-type-list-body');
  const container = document.getElementById('shift-type-list');
  if (!wrap || !container) return;
  const dates = Object.keys(confEntries).sort();
  if (!dates.length) { container.classList.add('hidden'); return; }
  container.classList.remove('hidden');
  wrap.innerHTML = '';
  dates.forEach(function(date) {
    if (!confEntries[date]) confEntries[date] = [{ name:'', type:'---' }];
    const entries = confEntries[date];
    // エントリが空の場合は空行を1件追加
    if (!entries.length) entries.push({ name:'', type:'---' });
    const label = fmtDateJP(date);
    entries.forEach(function(entry, idx) {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:7px 12px;border-bottom:1px solid var(--border);background:'+(idx%2===0?'#fff':'var(--gray-50)')+';';
      // 名前ドロップダウン（全スタッフから選択可）
      const nameOptions = allStaff.map(function(n){
        return '<option value="'+esc(n)+'"'+(entry.name===n?' selected':'')+'>'+esc(n)+'</option>';
      }).join('');
      // 最終行にのみ＋ボタン、それ以外は－ボタン
      const actionBtn = (idx === entries.length - 1)
        ? '<button style="min-width:28px;height:28px;border-radius:var(--radius);border:1px solid var(--green-400);background:var(--green-50);color:var(--green-600);font-size:15px;cursor:pointer;line-height:1;" '
          + 'onclick="addShiftTypeEntry(\''+date+'\')">＋</button>'
        : '<button style="min-width:28px;height:28px;border-radius:var(--radius);border:1px solid var(--border-md);background:var(--gray-100);color:var(--red-400);font-size:15px;cursor:pointer;line-height:1;" '
          + 'onclick="delShiftTypeEntry(\''+date+'\','+idx+')">－</button>';
      row.innerHTML =
        '<span style="min-width:80px;font-size:13px;color:var(--text-sub);">'+(idx===0?label:'')+'</span>'+
        '<select style="flex:1;font-size:13px;padding:3px 6px;border:1.5px solid var(--border-md);border-radius:var(--radius);'+(entry.name===''?'background:var(--amber-50);color:var(--amber-600);':'')+'" '+
          'onchange="confEntries[\''+date+'\']['+idx+'].name=this.value;this.style.background=this.value?\'\':(\'var(--amber-50)\');this.style.color=this.value?\'\':(\'var(--amber-600)\');renderInputCalendar();">'+
          '<option value="" style="background:var(--amber-50);color:var(--amber-600);">---------------</option>'+nameOptions+
        '</select>'+
        '<select style="width:88px;font-size:13px;padding:3px 6px;border:1.5px solid var(--border-md);border-radius:var(--radius);margin-right:4px;" '+
          'onchange="confEntries[\''+date+'\']['+idx+'].type=this.value;">'+
          '<option value="---"'+(entry.type==='---'?' selected':'')+'>---</option>'+
          '<option value="リスピーク"'+(entry.type==='リスピーク'?' selected':'')+'>リスピーク</option>'+
          '<option value="もじぱ"'+(entry.type==='もじぱ'?' selected':'')+'>もじぱ</option>'+
          '<option value="研修"'+(entry.type==='研修'?' selected':'')+'>研修</option>'+
        '</select>'+
        actionBtn;
      wrap.appendChild(row);
    });
  });
}

function addShiftTypeEntry(date) {
  if (!confEntries[date]) confEntries[date] = [];
  confEntries[date].push({ name:'', type:'---' });
  renderShiftTypeList();
  renderInputCalendar();
}

function delShiftTypeEntry(date, idx) {
  if (!confEntries[date] || confEntries[date].length <= 1) {
    confEntries[date] = [{ name:'', type:'---' }];
  } else {
    confEntries[date].splice(idx, 1);
  }
  renderShiftTypeList();
  renderInputCalendar();
}

function saveConfirmed() {
  const entries = [];
  Object.keys(confEntries).forEach(function(date) {
    confEntries[date].forEach(function(e){ if(e.name) entries.push({date:date, name:e.name, type:e.type}); });
  });
  // スタッフがいなくても確定可（全員✕の日があるケースに対応）
  // ただし対象日付が1件もない場合はエラー
  if (!Object.keys(confEntries).length) {
    const errEl = document.getElementById('conf-error');
    errEl.textContent='シフト対象日がありません'; errEl.classList.add('show'); return;
  }
  const btn = document.getElementById('save-confirm-btn');
  btn.disabled=true; btn.textContent='保存中…';
  document.getElementById('conf-error').classList.remove('show');
  postNoCors(GAS_URL.shift, { action:'confirmShift', year:String(inputCalYear), month:String(inputCalMonth), entries:JSON.stringify(entries) }, function() {
    btn.disabled=false; btn.textContent='✅ 決定（シフト確定へ反映）';
    const s = document.getElementById('conf-success');
    s.textContent='シフトを確定しました'; s.classList.add('show');
    showToast('シフト確定しました');
  });
}

// ---- シフト設定 ----
function loadShiftSettings() {
  const cbName = 'cb_sset_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    if (!res.success) return;
    const d = res.data;
    const dlEl = document.getElementById('shift-deadline-date');
    if (dlEl) { dlEl.value = d.shift_deadline || ''; }
    setJPHint('shift_deadline_jp', d.shift_deadline ? fmtDateJP(d.shift_deadline) : '');
    shiftDays    = (d.shift_days||'1,2,4,5').split(',').map(Number);
    extraDates   = (d.shift_extra_dates||'').split(',').filter(Boolean);
    excludedDates = (d.shift_excluded_dates||'').split(',').filter(Boolean);
    document.querySelectorAll('#admin-shift-days input[type=checkbox]').forEach(function(cb) {
      cb.checked = shiftDays.indexOf(parseInt(cb.value)) >= 0;
    });
    renderSettingCal();
  };
  jsonp(GAS_URL.admin, { action:'getSettings' }, cbName);
}

let settingCalMonth2 = null;
let settingCalYear2  = null;

function renderSettingCal() {
  const checkedDays = [];
  document.querySelectorAll('#admin-shift-days input[type=checkbox]:checked').forEach(function(cb){ checkedDays.push(parseInt(cb.value)); });
  _renderOneCal('setting-cal-grid', 'setting-cal-title', settingCalYear, settingCalMonth, checkedDays);
  const ny = settingCalMonth === 12 ? settingCalYear+1 : settingCalYear;
  const nm = settingCalMonth === 12 ? 1 : settingCalMonth+1;
  settingCalYear2  = ny;
  settingCalMonth2 = nm;
  _renderOneCal('setting-cal-grid2', 'setting-cal-title2', ny, nm, checkedDays);
}

function _renderOneCal(gridId, titleId, year, month, checkedDays) {
  const grid = document.getElementById(gridId);
  const titleEl = document.getElementById(titleId);
  if (!grid) return;
  grid.innerHTML = '';
  titleEl.textContent = year+'年'+month+'月';
  DOW_LABELS.forEach(function(d){ const c=document.createElement('div'); c.className='setting-cal-dow'; c.textContent=d; grid.appendChild(c); });
  const firstDow = new Date(year, month-1, 1).getDay();
  const days = new Date(year, month, 0).getDate();
  const todayKey = fmtDate(today);
  for (let i=0; i<firstDow; i++) { const b=document.createElement('div'); b.className='setting-cal-day empty'; grid.appendChild(b); }
  for (let d=1; d<=days; d++) {
    const dt  = new Date(year, month-1, d);
    const key = fmtDate(dt);
    const cell = document.createElement('div');
    cell.textContent = d;
    cell.className = 'setting-cal-day';
    const isPast = dt < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    if (isPast) { cell.classList.add('past'); }
    else {
      const isExcluded = excludedDates.indexOf(key) >= 0;
      const isExtra    = extraDates.indexOf(key) >= 0;
      const isBaseDay  = checkedDays.indexOf(dt.getDay()) >= 0;
      if (isExcluded) {
        cell.classList.add('excluded-day');
      } else if (isExtra) {
        cell.classList.add('extra-day');
      } else if (isBaseDay) {
        cell.classList.add('shift-day');
      }
      cell.addEventListener('click', function() { toggleSettingDay(key); renderSettingCal(); });
    }
    grid.appendChild(cell);
  }
}

function toggleSettingDay(key) {
  const checkedDays = [];
  document.querySelectorAll('#admin-shift-days input[type=checkbox]:checked').forEach(function(cb){ checkedDays.push(parseInt(cb.value)); });
  const dt = new Date(key);
  const isBaseDay  = checkedDays.indexOf(dt.getDay()) >= 0;
  const isExcluded = excludedDates.indexOf(key) >= 0;
  const isExtra    = extraDates.indexOf(key) >= 0;
  if (isExcluded) {
    excludedDates = excludedDates.filter(function(d){ return d !== key; });
  } else if (isExtra) {
    extraDates = extraDates.filter(function(d){ return d !== key; });
  } else if (isBaseDay) {
    excludedDates.push(key);
  } else {
    extraDates.push(key);
  }
}

function changeSettingCalMonth(delta) {
  settingCalMonth += delta;
  if (settingCalMonth > 12) { settingCalMonth=1; settingCalYear++; }
  if (settingCalMonth < 1)  { settingCalMonth=12; settingCalYear--; }
  renderSettingCal();
}

function saveShiftSettings() {
  const days = [];
  document.querySelectorAll('#admin-shift-days input[type=checkbox]:checked').forEach(function(cb){ days.push(cb.value); });
  const btn = document.querySelector('#subtab-shift-settings .btn-primary');
  btn.disabled=true; btn.textContent='保存中…';
  const sucEl = document.getElementById('shift-settings-success');
  postNoCors(GAS_URL.admin, {
    action:'updateSettings',
    shift_deadline:       document.getElementById('shift-deadline-date').value,
    shift_days:           days.join(','),
    shift_extra_dates:    extraDates.join(','),
    shift_excluded_dates: excludedDates.join(','),
  }, function() {
    btn.disabled=false; btn.textContent='設定を保存';
    sucEl.textContent='保存しました'; sucEl.classList.add('show');
    shiftDays = days.map(Number);
    showToast('シフト設定を保存しました');
  });
}

// ---- スタッフ管理 ----
function loadStaff() {
  const cbName = 'cb_staff_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    if (!res.success) return;
    staffData = res.data;
    allStaff  = staffData.map(function(s){ return s.reg_name||s.line_name||''; }).filter(Boolean);
    renderStaff();
  };
  jsonp(GAS_URL.admin, { action:'getStaffList' }, cbName);
}

function renderStaff() {
  const container = document.getElementById('staff-list');
  container.innerHTML = '';
  if (!staffData.length) {
    container.innerHTML='<p class="text-hint text-center mt-8">スタッフが登録されていません</p>'; return;
  }
  staffData.forEach(function(s, i) {
    const div = document.createElement('div');
    div.className = 'staff-row';
    div.innerHTML =
      '<div style="width:100%;display:flex;gap:6px;align-items:center;">'+
        '<span class="text-sm text-hint" style="min-width:56px;">登録名</span>'+
        '<input class="staff-name-input" type="text" value="'+esc(s.reg_name||'')+'" data-idx="'+i+'" data-field="reg_name" placeholder="登録名（アプリ表示）" style="flex:1;">'+
      '</div>'+
      '<div style="width:100%;display:flex;gap:6px;align-items:center;">'+
        '<span class="text-sm text-hint" style="min-width:56px;">LINE名</span>'+
        '<input class="staff-name-input" type="text" value="'+esc(s.line_name||'')+'" data-idx="'+i+'" data-field="line_name" placeholder="LINE表示名（自動）" style="flex:1;color:var(--text-hint);">'+
      '</div>'+
      '<div style="width:100%;display:flex;gap:6px;align-items:center;">'+
        '<span class="text-sm text-hint" style="min-width:56px;">メール</span>'+
        '<input class="staff-name-input" type="email" value="'+esc(s.email||'')+'" data-idx="'+i+'" data-field="email" placeholder="メールアドレス" style="flex:1;">'+
      '</div>'+
      '<div style="width:100%;display:flex;gap:6px;align-items:center;justify-content:space-between;">'+
        '<label class="staff-toggle"><input type="checkbox"'+(s.enabled?' checked':'')+' data-idx="'+i+'" onchange="toggleEnabled(this)"> 有効</label>'+
        '<span class="text-sm text-hint" style="font-size:10px;">LINE ID: '+esc(s.line_user_id||'未連携')+'</span>'+
        '<button class="staff-del-btn" onclick="deleteStaff('+i+')">削除</button>'+
      '</div>';
    container.appendChild(div);
    div.querySelectorAll('input[data-field]').forEach(function(inp) {
      inp.addEventListener('change', function(e) {
        updateStaffField(parseInt(e.target.dataset.idx,10), e.target.dataset.field, e.target.value);
      });
    });
    const hr = document.createElement('hr'); hr.className='divider'; container.appendChild(hr);
  });
}

function toggleEnabled(cb) {
  const s = staffData[parseInt(cb.dataset.idx,10)];
  postNoCors(GAS_URL.admin, { action:'updateStaff', row:String(s.row), enabled:cb.checked?'true':'false' },
    function(){ showToast(cb.checked?'有効にしました':'無効にしました'); });
}
function updateStaffField(idx, field, value) {
  const s = staffData[idx];
  const params = { action:'updateStaff', row:String(s.row) };
  params[field] = value;
  postNoCors(GAS_URL.admin, params, function(){ showToast('更新しました'); });
}
function addStaff() {
  const nameEl  = document.getElementById('new-staff-name');
  const emailEl = document.getElementById('new-staff-email');
  const name  = nameEl  ? nameEl.value.trim()  : '';
  const email = emailEl ? emailEl.value.trim() : '';
  if (!name) { showToast('登録名を入力してください'); return; }
  const btn = document.getElementById('add-staff-btn');
  btn.disabled=true; btn.textContent='追加中…';
  postNoCors(GAS_URL.admin, { action:'addStaff', name:name, email:email }, function() {
    if (nameEl)  nameEl.value='';
    if (emailEl) emailEl.value='';
    btn.disabled=false; btn.textContent='追加';
    showToast('スタッフを追加しました');
    setTimeout(loadStaff, 500);
  });
}
function deleteStaff(idx) {
  const s = staffData[idx];
  const dispName = s.reg_name||s.line_name||'（未登録）';
  if (!window.confirm(dispName+' を削除しますか？')) return;
  postNoCors(GAS_URL.admin, { action:'deleteStaff', row:String(s.row) }, function() {
    showToast('削除しました'); setTimeout(loadStaff, 500);
  });
}

// ---- ユーティリティ ----
function fmtDate(dt) {
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
// "YYYY-MM-DD" → "YYYY年M月D日"
function fmtDateJP(s) {
  const p = String(s||'').split('-');
  if (p.length < 3) return s;
  return parseInt(p[0],10)+'年'+parseInt(p[1],10)+'月'+parseInt(p[2],10)+'日';
}
// "HH:MM" → "H時M分"
function fmtTimeJP(s) {
  const p = String(s||'').split(':');
  if (p.length < 2) return s;
  return parseInt(p[0],10)+'時'+parseInt(p[1],10)+'分';
}
function jsonp(url, params, cbName) {
  const qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
  const s = document.createElement('script');
  s.src = url+'?'+qs+'&callback='+cbName;
  s.onerror = function(){ cleanup(cbName); if(typeof window[cbName]==='function') window[cbName]({success:false}); };
  document.head.appendChild(s);
}
function cleanup(cbName) {
  delete window[cbName];
  document.querySelectorAll('script[src*="'+cbName+'"]').forEach(function(el){el.remove();});
}
function postNoCors(url, params, cb) {
  try {
    const form = document.createElement('form');
    Object.keys(params).forEach(function(k){
      const i=document.createElement('input'); i.type='hidden';
      i.name=k; i.value=(params[k]==null?'':params[k]);
      form.appendChild(i);
    });
    fetch(url, { method:'POST', mode:'no-cors', body:new FormData(form) })
      .then(function(){ setTimeout(cb,5000); })
      .catch(function(){ setTimeout(cb,5000); });
  } catch(e) {
    console.error('postNoCors error', e);
    setTimeout(cb,1000);
  }
}
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}
function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
