<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出退勤連絡 | 字幕システム</title>
<link rel="stylesheet" href="../css/common.css">
<style>
.att-btn-group { display:flex; flex-direction:column; gap:16px; margin-top:24px; }
.att-btn { width:100%; min-height:72px; border-radius:var(--radius-lg); border:none; font-size:18px; font-weight:700; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:opacity .15s,transform .1s; padding:1.2rem; }
.att-btn:active { transform:scale(.97); }
.att-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-checkin  { background:var(--green-400); color:#fff; box-shadow:0 4px 16px rgba(29,158,117,.3); }
.btn-checkout { background:#2196F3; color:#fff; box-shadow:0 4px 16px rgba(33,150,243,.3); }
.btn-trouble-main { background:var(--amber-400); color:#fff; box-shadow:0 4px 16px rgba(239,159,39,.3); }
.att-icon { font-size:24px; }
.result-card { margin-top:16px; border-radius:var(--radius-lg); padding:16px; text-align:center; font-size:15px; font-weight:600; display:none; }
.result-card.show { display:block; }
.result-in  { background:var(--green-50); color:var(--green-600); border:1px solid rgba(29,158,117,.2); }
.result-out { background:#E3F2FD; color:#1565C0; border:1px solid rgba(33,150,243,.2); }
.liff-name-badge { background:var(--green-50); border:1px solid var(--green-100); border-radius:var(--radius); padding:8px 12px; font-size:13px; color:var(--green-600); margin-bottom:12px; display:none; }
.liff-name-badge.show { display:flex; align-items:center; gap:8px; }
/* トラブル報告フォーム */
.trouble-form-panel { display:none; margin-top:16px; background:var(--amber-50); border:1.5px solid rgba(239,159,39,.3); border-radius:var(--radius-lg); padding:16px; }
.trouble-form-panel.show { display:block; }
.trouble-form-title { font-size:14px; font-weight:700; color:var(--amber-600); margin-bottom:12px; }
.trouble-form-row { margin-bottom:10px; }
.trouble-form-row label { display:block; font-size:12px; font-weight:600; color:var(--text-sub); margin-bottom:4px; }
.trouble-form-row input,
.trouble-form-row textarea { width:100%; padding:8px 10px; border:1.5px solid var(--border-md); border-radius:var(--radius); font-size:14px; font-family:var(--font); }
.trouble-submit-btn { width:100%; min-height:48px; margin-top:12px; border-radius:var(--radius-lg); border:none; background:var(--amber-400); color:#fff; font-size:15px; font-weight:700; font-family:var(--font); cursor:pointer; }
.trouble-submit-btn:disabled { opacity:.5; cursor:not-allowed; }
.trouble-close-btn { width:100%; min-height:40px; margin-top:8px; border-radius:var(--radius-lg); border:1.5px solid var(--border-md); background:#fff; color:var(--text-sub); font-size:14px; font-weight:600; font-family:var(--font); cursor:pointer; }
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="header-logo">🕐</div>
    <div class="header-text">
      <div class="header-title">出退勤連絡</div>
      <div class="header-sub">出勤・退勤時にボタンを押してください</div>
    </div>
    <a class="header-back" href="../">🏠 ホーム</a>
  </header>

  <div class="content">
    <div id="liff-badge" class="liff-name-badge">
      <span>🟢</span><span id="liff-badge-name"></span><span class="text-hint text-sm">でログイン中</span>
    </div>

    <div class="form-group" id="staff-select-wrap">
      <label class="form-label">スタッフ名</label>
      <select id="staff-name" class="form-control" onchange="onNameChange()">
        <option value="">名前を選択してください</option>
      </select>
    </div>

    <div id="shift-check-msg" style="display:none;background:var(--amber-50);border:1px solid rgba(239,159,39,.3);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--amber-600);margin-bottom:12px;">
      ⚠️ 本日のシフトに入っていないため、出退勤の記録はできません。
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="att-btn-group" id="main-buttons">
      <button class="att-btn btn-checkin"  id="btn-in"  onclick="submitAttendance('in')">
        <span class="att-icon">🏢</span><span>出勤</span>
      </button>
      <button class="att-btn btn-checkout" id="btn-out" onclick="submitAttendance('out')">
        <span class="att-icon">🏠</span><span>退勤</span>
      </button>
      <button class="att-btn btn-trouble-main" id="btn-trouble" onclick="showTroubleForm()">
        <span class="att-icon">⚠️</span><span>トラブル報告</span>
      </button>
    </div>

    <div id="result-in"  class="result-card result-in"></div>
    <div id="result-out" class="result-card result-out"></div>

    <!-- トラブル報告フォーム -->
    <div id="trouble-form-panel" class="trouble-form-panel">
      <div class="trouble-form-title">⚠️ トラブル報告フォーム</div>
      <!-- 緊急連絡先 -->
      <div style="background:#fff;border:2px solid var(--red-600);border-radius:var(--radius);padding:14px 12px;margin-bottom:14px;text-align:center;">
        <div style="font-size:12px;font-weight:600;color:var(--red-600);margin-bottom:8px;">緊急トラブルの場合は、下記の電話番号に連絡してください</div>
        <a id="emergency-phone-link" href="#" style="font-size:28px;font-weight:800;color:var(--red-600);letter-spacing:.04em;text-decoration:none;display:block;margin-bottom:10px;">読み込み中…</a>
        <div style="font-size:11px;color:var(--text-sub);line-height:1.7;text-align:left;">
          📞 電話が終わったら、トラブル内容を下記のフォームに記載して報告してください<br>
          📝 緊急でない場合は、直接フォームで報告してください
        </div>
      </div>
      <div class="trouble-form-row">
        <label>発生時刻</label>
        <input type="time" id="tr-time" />
      </div>
      <div class="trouble-form-row">
        <label>状況・内容</label>
        <textarea id="tr-situation" rows="3" placeholder="何が起きたか記入してください"></textarea>
      </div>
      <div class="trouble-form-row">
        <label>対応内容</label>
        <textarea id="tr-action" rows="2" placeholder="どう対応したか記入してください"></textarea>
      </div>
      <button class="trouble-submit-btn" id="trouble-submit-btn" onclick="submitTroubleReport()">📧 管理者に送信する</button>
      <button class="trouble-close-btn" onclick="hideTroubleForm()">キャンセル</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script src="../js/config.js"></script>
<script src="../js/liff-helper.js"></script>
<script>
let lockedName = null;

LiffHelper.init(LIFF_ID.attendance, GAS_URL.attendance, function(name, isLiff) {
  if (name) {
    lockedName = name;
    document.getElementById('liff-badge-name').textContent = name;
    document.getElementById('liff-badge').classList.add('show');
    document.getElementById('staff-select-wrap').classList.add('hidden');
    checkLocalSubmission();
    refreshState(name);
  } else {
    loadStaffNames();
  }
  loadSettings();
});

function loadSettings() {
  const cbName = 'cb_settings_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    const phone = (res.success && res.data && res.data.emergency_phone) ? res.data.emergency_phone : '（未設定）';
    const link = document.getElementById('emergency-phone-link');
    link.textContent = phone;
    link.href = phone !== '（未設定）' ? 'tel:'+phone.replace(/[^0-9+]/g,'') : '#';
  };
  jsonp(GAS_URL.attendance, { action:'getSettings' }, cbName);
}

function loadStaffNames() {
  const cbName = 'cb_staff_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    const names = (res.success && res.data) ? res.data : [];
    const sel = document.getElementById('staff-name');
    sel.innerHTML = '<option value="">名前を選択してください</option>';
    names.forEach(function(n){ const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
  };
  jsonp(GAS_URL.attendance, { action:'getStaff' }, cbName);
}

function getSelectedName() { return lockedName || document.getElementById('staff-name').value; }

function submitAttendance(type) {
  const name  = getSelectedName();
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');
  if (!name) { errEl.textContent='スタッフ名を選択してください'; errEl.classList.add('show'); return; }

  const label = type === 'in' ? '出勤' : '退勤';
  if (!window.confirm(label+'を記録しますか？')) return;

  const btnIn  = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  const btnTr  = document.getElementById('btn-trouble');
  btnIn.disabled = btnOut.disabled = btnTr.disabled = true;
  if (type === 'in') btnIn.innerHTML = '<span class="att-icon">⏳</span><span>送信中…</span>';
  else               btnOut.innerHTML = '<span class="att-icon">⏳</span><span>送信中…</span>';

  postNoCors(GAS_URL.attendance, { action:'submitAttendance', name:name, type:type }, function() {
    btnTr.disabled = false;
    btnIn.innerHTML  = '<span class="att-icon">🏢</span><span>出勤</span>';
    btnOut.innerHTML = '<span class="att-icon">🏠</span><span>退勤</span>';
    btnIn.disabled = false; btnOut.disabled = false;
    const now2 = new Date();
    const timeStr = pad(now2.getHours())+':'+pad(now2.getMinutes());
    localStorage.setItem('att_' + type + '_' + getTodayStr(), timeStr);
    if (type === 'in') {
      document.getElementById('result-in').textContent='🏢 '+timeStr+' に出勤を記録しました';
      document.getElementById('result-in').classList.add('show');
      document.getElementById('result-out').classList.remove('show');
    } else {
      document.getElementById('result-out').textContent='🏠 '+timeStr+' に退勤を記録しました';
      document.getElementById('result-out').classList.add('show');
      document.getElementById('result-in').classList.remove('show');
    }
    checkLocalSubmission();
    showToast('送信しました');
  });
}

function showTroubleForm() {
  const now = new Date();
  document.getElementById('tr-time').value = pad(now.getHours())+':'+pad(now.getMinutes());
  document.getElementById('tr-situation').value = '';
  document.getElementById('tr-action').value = '';
  const btn = document.getElementById('trouble-submit-btn');
  btn.disabled = false; btn.textContent = '📧 管理者に送信する';
  document.getElementById('trouble-form-panel').classList.add('show');
  document.getElementById('trouble-form-panel').style.border = '';
}

function hideTroubleForm() {
  document.getElementById('trouble-form-panel').classList.remove('show');
}

function submitTroubleReport() {
  const name      = getSelectedName();
  const errEl     = document.getElementById('error-msg');
  errEl.classList.remove('show');
  if (!name) { errEl.textContent='スタッフ名を選択してください'; errEl.classList.add('show'); return; }

  const time      = document.getElementById('tr-time').value;
  const situation = document.getElementById('tr-situation').value.trim();
  const action    = document.getElementById('tr-action').value.trim();
  if (!situation) { showToast('状況・内容を入力してください'); return; }

  const detail = [
    '【発生時刻】'+time,
    '【状況・内容】'+situation,
    '【対応内容】'+(action||'記載なし'),
  ].join('\n');

  const btn = document.getElementById('trouble-submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 送信中…';

  postNoCors(GAS_URL.trouble, { action:'submitTrouble2nd', name:name, detail:detail }, function() {
    btn.textContent = '✅ 送信しました';
    document.getElementById('trouble-form-panel').style.border = '1.5px solid var(--green-400)';
    showToast('トラブル報告を送信しました');
  });
}

function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function checkLocalSubmission() {
  const key = getTodayStr();
  const inTime  = localStorage.getItem('att_in_'  + key);
  const outTime = localStorage.getItem('att_out_' + key);
  if (inTime) {
    const btn = document.getElementById('btn-in');
    btn.disabled = true;
    btn.innerHTML = '<span class="att-icon">✅</span><span>本日は送信済みです</span>';
    const el = document.getElementById('result-in');
    el.textContent = '🏢 ' + inTime + ' に出勤を記録しました'; el.classList.add('show');
  }
  if (outTime) {
    const btn = document.getElementById('btn-out');
    btn.disabled = true;
    btn.innerHTML = '<span class="att-icon">✅</span><span>本日は送信済みです</span>';
    const el = document.getElementById('result-out');
    el.textContent = '🏠 ' + outTime + ' に退勤を記録しました'; el.classList.add('show');
  }
}

// サーバー側のシフト・出退勤記録を取得し、ボタンの有効/無効を確定させる（localStorageは同一端末のみの暫定表示、こちらが正本）
function refreshState(name) {
  if (!name) return;
  const now = new Date();
  const todayStr = getTodayStr();
  let isOnShift = null;
  let attStatus = null;
  function tryFinalize() {
    if (isOnShift === null || attStatus === null) return;
    updateButtonStates(isOnShift, attStatus);
  }

  const cbShift = 'cb_todayshift_' + Date.now();
  window[cbShift] = function(res) {
    cleanup(cbShift);
    const data = (res.success && res.data) ? res.data : {};
    const todayEntries = data[todayStr] || [];
    isOnShift = todayEntries.some(function(e) { return e.name === name; });
    tryFinalize();
  };
  jsonp(GAS_URL.shift, { action:'getConfirmedShift', year:now.getFullYear(), month:now.getMonth()+1 }, cbShift);

  const cbAtt = 'cb_todayatt_' + Date.now();
  window[cbAtt] = function(res) {
    cleanup(cbAtt);
    attStatus = (res.success && res.data) ? res.data : { in:false, out:false };
    tryFinalize();
  };
  jsonp(GAS_URL.attendance, { action:'getTodayAttendance', name:name }, cbAtt);
}

function updateButtonStates(isOnShift, attStatus) {
  const shiftMsg = document.getElementById('shift-check-msg');
  const btnIn  = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  const btnTr  = document.getElementById('btn-trouble');

  if (!isOnShift) {
    shiftMsg.style.display = '';
    btnIn.disabled  = true;
    btnOut.disabled = true;
    btnTr.disabled  = true;
    return;
  }
  shiftMsg.style.display = 'none';
  btnTr.disabled = false;

  const key = getTodayStr();
  const inDone  = (attStatus && attStatus.in)  || !!localStorage.getItem('att_in_'  + key);
  const outDone = (attStatus && attStatus.out) || !!localStorage.getItem('att_out_' + key);

  if (inDone) {
    btnIn.disabled = true;
    btnIn.innerHTML = '<span class="att-icon">✅</span><span>本日は送信済みです</span>';
  } else {
    btnIn.disabled = false;
    btnIn.innerHTML = '<span class="att-icon">🏢</span><span>出勤</span>';
  }
  if (outDone) {
    btnOut.disabled = true;
    btnOut.innerHTML = '<span class="att-icon">✅</span><span>本日は送信済みです</span>';
  } else {
    btnOut.disabled = false;
    btnOut.innerHTML = '<span class="att-icon">🏠</span><span>退勤</span>';
  }
}

function onNameChange() {
  const name = document.getElementById('staff-name').value;
  if (name) {
    checkLocalSubmission();
    refreshState(name);
  } else {
    document.getElementById('shift-check-msg').style.display = 'none';
    const btnIn  = document.getElementById('btn-in');
    const btnOut = document.getElementById('btn-out');
    const btnTr  = document.getElementById('btn-trouble');
    btnIn.disabled  = false; btnIn.innerHTML  = '<span class="att-icon">🏢</span><span>出勤</span>';
    btnOut.disabled = false; btnOut.innerHTML = '<span class="att-icon">🏠</span><span>退勤</span>';
    btnTr.disabled  = false;
  }
}

function pad(n) { return String(n).padStart(2,'0'); }

function jsonp(url, params, cbName) {
  const qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
  const s = document.createElement('script');
  s.src = url+'?'+qs+'&callback='+cbName;
  s.onerror = function(){ cleanup(cbName); if(typeof window[cbName]==='function') window[cbName]({success:false}); };
  document.head.appendChild(s);
}
function cleanup(cbName) {
  delete window[cbName];
  document.querySelectorAll('script[src*="'+cbName+'"]').forEach(function(el){el.remove();});
}
function postNoCors(url, params, cb) {
  const form = document.createElement('form');
  Object.keys(params).forEach(function(k){ const i=document.createElement('input'); i.type='hidden'; i.name=k; i.value=params[k]; form.appendChild(i); });
  fetch(url, { method:'POST', mode:'no-cors', body:new FormData(form) })
    .then(function(){ setTimeout(cb,3000); }).catch(function(){ setTimeout(cb,3000); });
}
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}
</script>
</body>
</html>
