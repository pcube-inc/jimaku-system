<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トラブル対応 | P-CUBE（字幕）</title>
<link rel="stylesheet" href="../css/common.css">
<style>
.trouble-send-btn { width:100%; min-height:72px; border-radius:var(--radius-lg); border:none; background:var(--red-400); color:#fff; font-size:18px; font-weight:700; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; padding:1.2rem; box-shadow:0 4px 16px rgba(226,75,74,.35); transition:opacity .15s,transform .1s; margin-top:8px; }
.trouble-send-btn:active { transform:scale(.97); }
.trouble-send-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.trouble-icon { font-size:24px; }
.liff-name-badge { background:var(--green-50); border:1px solid var(--green-100); border-radius:var(--radius); padding:8px 12px; font-size:13px; color:var(--green-600); margin-bottom:12px; display:none; }
.liff-name-badge.show { display:flex; align-items:center; gap:8px; }
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="header-logo" style="background:var(--red-400);">🚨</div>
    <div class="header-text">
      <div class="header-title">トラブル対応</div>
      <div class="header-sub">トラブルなどの緊急連絡</div>
    </div>
    <a class="header-back" href="../">🏠 ホーム</a>
  </header>

  <div class="content">
    <div id="liff-badge" class="liff-name-badge">
      <span>🟢</span><span id="liff-badge-name"></span><span class="text-hint text-sm">でログイン中</span>
    </div>

    <div class="form-group" id="staff-select-wrap">
      <label class="form-label">スタッフ名</label>
      <select id="staff-name" class="form-control">
        <option value="">名前を選択してください</option>
      </select>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="card" style="background:var(--red-50);border-color:rgba(226,75,74,.2);margin-bottom:12px;">
      <div class="card-title" style="color:var(--red-600);">🚨 緊急連絡</div>
      <p class="text-sm text-sub">状況を入力して送信してください。管理者に即時通知されます。</p>
    </div>

    <div class="form-group">
      <label class="form-label">状況・詳細</label>
      <textarea id="detail-text" class="form-control" rows="5" placeholder="発生した状況、場所、対応状況などを記入してください"></textarea>
    </div>

    <button class="trouble-send-btn" id="btn-send" onclick="submitTrouble()">
      <span class="trouble-icon">🚨</span><span>送信する</span>
    </button>

    <div id="sent-msg" class="success-msg mt-12"></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script src="../js/config.js"></script>
<script src="../js/liff-helper.js"></script>
<script>
let lockedName = null;

LiffHelper.init(LIFF_ID.trouble, GAS_URL.trouble, function(name, isLiff) {
  if (name) {
    lockedName = name;
    document.getElementById('liff-badge-name').textContent = name;
    document.getElementById('liff-badge').classList.add('show');
    document.getElementById('staff-select-wrap').classList.add('hidden');
  } else {
    loadStaffNames();
  }
});

function loadStaffNames() {
  const cbName = 'cb_staff_'+Date.now();
  window[cbName] = function(res) {
    cleanup(cbName);
    const names = (res.success && res.data) ? res.data : [];
    const sel = document.getElementById('staff-name');
    sel.innerHTML = '<option value="">名前を選択してください</option>';
    names.forEach(function(n){ const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
  };
  jsonp(GAS_URL.trouble, { action:'getStaff' }, cbName);
}

function getSelectedName() { return lockedName || document.getElementById('staff-name').value; }

function submitTrouble() {
  const name   = getSelectedName();
  const detail = document.getElementById('detail-text').value.trim();
  const errEl  = document.getElementById('error-msg');
  errEl.classList.remove('show');
  if (!name)   { errEl.textContent='スタッフ名を選択してください'; errEl.classList.add('show'); return; }
  if (!detail) { errEl.textContent='状況・詳細を入力してください'; errEl.classList.add('show'); return; }
  if (!window.confirm('管理者へ緊急連絡を送信しますか？')) return;

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.innerHTML = '<span class="trouble-icon">⏳</span><span>送信中…</span>';

  postNoCors(GAS_URL.trouble, { action:'submitTrouble2nd', name:name, detail:detail }, function() {
    btn.innerHTML = '<span class="trouble-icon">✅</span><span>送信済み</span>';
    btn.style.background = 'var(--gray-400)';
    const s = document.getElementById('sent-msg');
    s.textContent = '✅ 送信しました。管理者に通知されました。';
    s.classList.add('show');
    showToast('送信しました');
  });
}

function jsonp(url, params, cbName) {
  const qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
  const s = document.createElement('script');
  s.src = url+'?'+qs+'&callback='+cbName;
  s.onerror = function(){ cleanup(cbName); if(typeof window[cbName]==='function') window[cbName]({success:false}); };
  document.head.appendChild(s);
}
function cleanup(cbName) {
  delete window[cbName];
  document.querySelectorAll('script[src*="'+cbName+'"]').forEach(function(el){el.remove();});
}
function postNoCors(url, params, cb) {
  const form = document.createElement('form');
  Object.keys(params).forEach(function(k){ const i=document.createElement('input'); i.type='hidden'; i.name=k; i.value=params[k]; form.appendChild(i); });
  fetch(url, { method:'POST', mode:'no-cors', body:new FormData(form) })
    .then(function(){ setTimeout(cb,3000); }).catch(function(){ setTimeout(cb,3000); });
}
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}
</script>
</body>
</html>
